name: Build iOS App

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # This allows you to manually trigger the build from the Actions tab

jobs:
  build:
    # The app requires Xcode 16+, which is standard on the macos-15 runner
    runs-on: macos-15 

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Build Xcode Project (Unsigned)
      # Builds the app for iOS and explicitly disables code signing
      run: |
        xcodebuild clean build \
          -project QwenChat.xcodeproj \
          -scheme QwenChat \
          -configuration Release \
          -sdk iphoneos \
          -derivedDataPath build \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_IDENTITY=""

    - name: Package into IPA
      # iOS apps must be inside a "Payload" folder before being zipped into an .ipa
      run: |
        mkdir -p Payload
        cp -r build/Build/Products/Release-iphoneos/QwenChat.app Payload/
        zip -r QwenChat.ipa Payload

    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: QwenChat-Unsigned-IPA
        path: QwenChat.ipa
